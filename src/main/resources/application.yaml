spring:
  application:
    name: creditscore

  datasource:
    url: jdbc:postgresql://localhost:5432/banking_db
    username: postgres
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  jackson:
    serialization:
      INDENT_OUTPUT: true

  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest

    properties:
      spring:
        json:
          trusted:
            packages: "com.yourbank.*"

server:
  port: 8080

jwt:
  secret: mySuperSecretKeyForJwtAuthenticationForBankingManagementApplication